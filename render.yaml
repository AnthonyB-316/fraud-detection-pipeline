# Render.com Blueprint
# Deploy with: Connect GitHub repo at render.com/dashboard

services:
  # Main API Service
  - type: web
    name: fraud-detection-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerTarget: api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true

